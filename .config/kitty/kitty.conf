# vim:fileencoding=utf-8:foldmethod=marker
#

term xterm-256color

#: Environment -----------------------------
env VISUAL=vimr
env EDITOR=nvim

#: Fonts -----------------------------------
font_family				SFMono Nerd Font
bold_font        		auto
italic_font      		auto
bold_italic_font 		auto
font_size				14

#: Layouts ---------------------------------
remember_window_size	yes
initial_window_width  	1200
initial_window_height 	1000
enabled_layouts			tall:fat
window_padding_width	1 1 1 1

#: Mouse -----------------------------------
mouse_hide_wait			3.0
copy_on_select			yes

#: Shell ----------------------------------
allow_remote_control	yes
shell					/bin/zsh
editor					/usr/local/bin/nvim
scrollback_lines		5000
enable_audio_bell		no
shell_integration		disabled
close_on_child_death	no
term					xterm-kitty
allow_hyperlinks		yes

#: Tab Bar --------------------------------
tab_title_template "⌘{index} {fmt.fg.red}{bell_symbol}{activity_symbol}{fmt.fg.default}{title}"
tab_fade				0.25 0.5 0.75 1
tab_switch_strategy		previous
tab_bar_edge			top
tab_bar_align			left
tab_bar_min_tabs		1
tab_bar_style			powerline
tab_powerline_style 	angled
tab_bar_margin_width	1.5
tab_bar_margin_height	1.5	1.5

#: MacOS ----------------------------------
macos_titlebar_color				system
macos_option_as_alt					both
macos_thicken_font					0.75
macos_custom_beam_cursor			yes
macos_show_window_title_in			all
macos_hide_from_tasks				no
macos_quit_when_last_window_closed	no
macos_traditional_fullscreen		no
macos_custom_beam_cursor			yes

#: Includes -------------------------------
include keybindings.conf
include style.conf
